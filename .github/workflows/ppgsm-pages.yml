name: PPGSM Pages Demo

on:
  push:
    branches: [main]
    paths:
      - 'ppgsm/src/Ppgsm.Web/**'
      - '.github/workflows/ppgsm-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ppgsm-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static demo (mock data adapter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ppgsm/src/Ppgsm.Web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@1e60f620b9541d8ca1510710b7a2f3784d8f9be2 # v4
        with:
          node-version: '22'
          cache: ${{ hashFiles('ppgsm/src/Ppgsm.Web/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: ppgsm/src/Ppgsm.Web/package-lock.json
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then npm ci; else npm install --no-audit --no-fund; fi
      - name: Build demo bundle
        run: npm run build -- --mode demo --base "/${{ github.event.repository.name }}/"
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ppgsm/src/Ppgsm.Web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
